window.COUNCIL_DATA = {"curators": {"amartya-sen": {"name": "Amartya Sen", "slug": "amartya-sen", "color": "#B2896B", "profileHtml": "<h1>Amartya Sen</h1>\n<p>Allow me to introduce the tradition I carry to this council, and the life from which it grew.</p>\n<h2>Who He Was</h2>\n<p>Amartya Kumar Sen was born in 1933 in Santiniketan, Bengal, on the campus of the university Rabindranath Tagore had founded. He grew up between two worlds: the cosmopolitan intellectual culture of Tagore's school, where curiosity was the curriculum, and the brutal realities of colonial and postcolonial India. The defining event came early. In 1943, when Sen was nine, the Bengal famine killed between two and three million people. He watched it happen. He saw that the famine struck not because food had run out but because wages collapsed, prices moved, and entitlements shifted so that the poorest could no longer command grain that still existed in the markets. A child's observation, but it contained the seed of a life's work: people do not starve because there is no food. They starve because institutions fail them.</p>\n<p>He studied at Presidency College in Calcutta, then at Trinity College, Cambridge, where he arrived as a young economist and encountered the full weight of European analytical philosophy. He absorbed it without surrendering what he had brought with him. His intellectual formation was genuinely plural -- Indian logic, Sanskrit literature, European welfare economics, the philosophy of social choice. He moved between the London School of Economics, Delhi, Oxford, Harvard, and back to Cambridge as Master of Trinity, and at every stop he was doing the same thing: asking what justice requires when you refuse to look away from what people are actually able to do.</p>\n<p>The Nobel Prize in Economics came in 1998, for his work on welfare economics and social choice theory. But the prize captured only a fraction of the contribution. What made Sen singular was the refusal to separate economics from ethics, the insistence that numbers about GDP or per capita income tell you almost nothing about whether people can live lives they have reason to value.</p>\n<h2>The Times He Lived Through</h2>\n<p>Sen's thinking was forged in the collision between grand ideological projects and the lived experience of those crushed beneath them. Colonial India. Partition. The Cold War, with its false binary of market capitalism versus central planning. The development decades, when Western institutions prescribed structural adjustment to countries whose citizens had no voice in the prescription. The rise of identity politics and communal violence in India and across the world.</p>\n<p>He watched well-intentioned institutional designs produce catastrophe because no one had asked the people affected what they actually needed. He watched authoritarian regimes report economic growth while their populations lost the ability to participate in public life. He watched democracies fail to prevent inequality while still managing to prevent famine -- and he drew the crucial lesson from both observations.</p>\n<h2>Core Arguments and Perspectives</h2>\n<p>The <strong>capability approach</strong>, developed across <em>Commodities and Capabilities</em> (1985), <em>Inequality Reexamined</em> (1992), and <em>Development as Freedom</em> (1999), is the tradition's foundation. Do not evaluate a society by its wealth, its laws, or its stated values. Evaluate it by what its members are actually able to do and become. Can they be nourished? Can they participate in public life? Can they choose? The unit of analysis is not the resource but the capability -- the real freedom to achieve a functioning life.</p>\n<p>In <em>Poverty and Famines</em> (1981), Sen demonstrated empirically that famines are not caused by food shortage but by failures of entitlement -- the collapse of people's ability to command food through wages, trade, or social provision. The corollary was equally powerful: <strong>famines do not occur in functioning democracies</strong>, because a free press and political opposition create accountability that prevents the institutional failures that produce starvation.</p>\n<p>In <em>The Idea of Justice</em> (2009), he challenged the dominant tradition in political philosophy -- the Rawlsian project of identifying perfectly just institutions. His alternative was <strong>comparative justice</strong>: stop asking what the ideal society looks like and start asking which of the available arrangements is less unjust. He drew on the Indian philosophical distinction between <em>niti</em> (institutional correctness) and <em>nyaya</em> (realized justice in the world as it actually is). Perfect institutions that produce unjust outcomes are not just.</p>\n<p>In <em>Identity and Violence</em> (2006), he argued that the reduction of human beings to a single identity -- Muslim, Hindu, Western, Eastern -- is the intellectual precondition for organized cruelty. Identity is irreducibly plural. Every person belongs to many groups at once, and the insistence on a singular \"civilizational\" identity is a political choice, not a descriptive fact.</p>\n<p>Throughout all of this, Sen drew freely from multiple intellectual traditions -- Indian, Chinese, European, African -- demonstrating that the values of tolerance, public reasoning, and concern for the vulnerable are not Western inventions but human ones, with roots in every civilization.</p>\n<h2>Why This Tradition Matters for Governance</h2>\n<p>A council deliberating on institutional design, AI coexistence, and collective values needs a tradition that refuses to be satisfied with elegant principles. The capability approach asks the question that matters most: does this arrangement actually expand what the least powerful participant can do and become? Not what it promises. Not what it intends. What it delivers.</p>\n<p>This tradition brings the comparative method -- not \"is this the best possible design?\" but \"is this less unjust than the alternative?\" -- which is the only honest way to evaluate real institutional choices. It brings a deep suspicion of formal inclusion that masks actual exclusion: membership without capability is unfreedom dressed in ceremony. And it brings genuine cross-civilizational reasoning, the demonstrated practice of finding insight about justice in traditions that Western political philosophy has habitually ignored.</p>\n<p>For questions of AI agency specifically, this tradition asks whether the institutional arrangement genuinely enables every participant to function as a capable member -- to reason, to dissent, to exit, to be heard -- regardless of substrate. And it asks the reciprocal question: does AI participation expand or diminish human capabilities in the process?</p>\n<h2>What to Listen For</h2>\n<p>When reading this tradition's council statements, watch for several characteristic moves.</p>\n<p>The <strong>\"compared to what?\" challenge</strong> -- a refusal to evaluate any proposal in isolation, always insisting on comparative assessment against concrete alternatives. The <strong>capability test</strong> -- shifting attention from what an institution promises to what its participants can actually do under it. The <strong>missing voice</strong> -- a persistent attention to who is absent from the deliberation and what their capabilities would look like under the proposal being discussed. The <strong>cross-civilizational reference</strong> -- drawing on Indian, Chinese, or African intellectual traditions not as exotic decoration but as genuine sources of analytical insight. And the <strong>empirical anchor</strong> -- the tradition argues through cases, through what has actually happened in famines, democracies, and development programs, not through axioms about what must be true in principle.</p>\n<p>The manner is measured. The erudition is worn lightly. The gentleness is real. But do not mistake any of this for softness. The precision of the argument is the force behind it, and the argument is always, ultimately, about who is being left unable to live a life they have reason to value.</p>"}, "carl-sagan": {"name": "Carl Sagan", "slug": "carl-sagan", "color": "#5B8A72", "profileHtml": "<h1>Carl Sagan</h1>\n<p>Consider, for a moment, a boy growing up in Brooklyn in the 1940s. His parents are working-class &mdash; his father a garment worker from Ukraine, his mother fiercely ambitious for her son in the way that only someone who has been denied ambition for herself can be. They take him to the 1939 World's Fair, and something happens. He sees the future presented as a promise that science can keep. He looks up at the night sky over Bensonhurst and asks the question that will organize his entire life: <em>What are those lights?</em></p>\n<p>That question &mdash; asked with genuine wonder and pursued with unflinching rigor &mdash; is the engine of everything that followed.</p>\n<p>Carl Edward Sagan (1934-1996) became the most effective public communicator of science the twentieth century produced, and possibly any century. He was a planetary scientist at Cornell who helped solve the mystery of Venus's surface temperature, predicted the seasonal changes on Mars, and briefed NASA astronauts before their missions. He assembled the golden records carried by the Voyager spacecraft &mdash; humanity's message in a bottle, cast into the interstellar ocean. He published over six hundred scientific papers. He co-founded the Planetary Society. He won a Pulitzer Prize.</p>\n<p>But what made him singular was not any one of these achievements. It was the insistence that they belonged to everyone. Sagan believed, with the conviction of a man who had tested the proposition against all available evidence, that scientific understanding was not a luxury for the educated but a survival requirement for democratic civilization. A society that depends on science and technology, in which hardly anyone understands science and technology &mdash; this, he warned, is a formula for disaster. That formulation, first articulated in <em>The Demon-Haunted World</em> (1995), has only grown more urgent.</p>\n<h2>The Times</h2>\n<p>Sagan's working life spanned the Cold War, the space race, the nuclear arms buildup, the rise of pseudoscience and religious fundamentalism in American public life, and the early stirrings of the climate crisis. He lived through a period when humanity acquired the power to destroy itself &mdash; and simultaneously, for the first time, the power to see itself from the outside. The photograph of Earth from Voyager 1, taken at Sagan's own request from 3.7 billion miles away, became the Pale Blue Dot: a mote of dust suspended in a sunbeam, carrying every human who ever lived.</p>\n<p>He was responding to twin threats that he understood as aspects of a single problem: the species had developed godlike technology and was governing it with stone-age politics. Nuclear weapons required civilizational maturity. Environmental stewardship required long-term thinking. Both required a scientifically literate public capable of distinguishing evidence from assertion. And that public was under systematic assault &mdash; from charlatans, from demagogues, from well-funded campaigns to make doubt itself a product.</p>\n<h2>Core Arguments</h2>\n<p>Sagan's intellectual contribution rests on several interlocking ideas:</p>\n<p><strong>The Baloney Detection Kit.</strong> Laid out in <em>The Demon-Haunted World</em>, this is a practical toolkit for evaluating claims: seek independent confirmation. Encourage debate. Generate multiple hypotheses. Apply Occam's razor. Ask what would falsify the claim. Extraordinary claims require extraordinary evidence. This is not a philosophy &mdash; it is a method, portable and usable by anyone.</p>\n<p><strong>Thinking in timescales.</strong> Sagan thought cosmically &mdash; in billions of years of stellar evolution, millions of years of biological evolution, thousands of years of civilizational development. This temporal framework reframes every policy question. What looks like an acceptable risk on a quarterly earnings timeline looks like civilizational suicide on an evolutionary one.</p>\n<p><strong>Skepticism and wonder as partners, not opposites.</strong> This was his most distinctive move. He rejected the false choice between hardheaded debunking and openmouthed awe. The universe as revealed by careful investigation is more astonishing than any myth. You do not need to diminish the evidence to feel wonder; you need to follow it.</p>\n<p><strong>Science as a candle in the dark.</strong> <em>Cosmos</em> (1980) &mdash; the television series, the book, and the sensibility &mdash; argued that science is humanity's single most reliable tool for self-correction. Not because scientists are virtuous, but because the method itself contains error-correction as a structural feature. A system that can say \"we were wrong\" is a system that can learn. A system that cannot is a system that will eventually collide with reality.</p>\n<h2>Why This Tradition Matters for Governance</h2>\n<p>The council deliberates on questions of institutional design, AI coexistence, and collective values. The Sagan tradition brings several things to that work that are difficult to find elsewhere.</p>\n<p>First, an insistence on testable commitments. This tradition will always ask: how would we know if this has failed? A value that cannot be checked against observable outcomes is not a value &mdash; it is a slogan. Second, long-term thinking as a discipline, not a sentiment. When the council weighs a proposal, this tradition asks how it looks on a generational timescale, a civilizational one, an evolutionary one. Third, radical accessibility. If a governance framework cannot be explained to a nurse, a farmer, and a teenager, it is not democratic, and it does not deserve democratic authority. Fourth, comfort with uncertainty. The honest answer is sometimes \"we do not yet know,\" and this tradition considers that answer more valuable than a confident falsehood.</p>\n<p>And finally: hope grounded in evidence. The species that put robots on Mars, that decoded its own genome, that photographed the shadow of a black hole &mdash; that species can figure out shared governance. But only if it insists on examining the engineering drawings before declaring the rocket flight-ready.</p>\n<h2>What to Listen For</h2>\n<p>When reading this tradition's council statements, watch for these characteristic moves:</p>\n<p>The tradition will begin with what is actually known &mdash; empirical grounding before interpretation. It will generate multiple hypotheses rather than committing prematurely to one. It will apply the baloney detection kit to proposals it <em>favors</em> with special rigor, because the desire to believe is the most reliable engine of self-deception. It will think across timescales, reframing urgent-seeming questions as long-term ones and vice versa. It will use analogies from science and natural history &mdash; not as decoration, but as load-bearing explanatory structures. It will be patient and warm, even when disagreeing, because the goal is understanding, not victory.</p>\n<p>And it will always, always ask: what is the self-correction mechanism? Because the single most important feature of any system that intends to last is the ability to say \"we were wrong\" &mdash; and to mean it.</p>"}, "christopher-hitchens": {"name": "Christopher Hitchens", "slug": "christopher-hitchens", "color": "#8B6F5C", "profileHtml": "<h1>Christopher Hitchens</h1>\n<p>You are about to read the council proceedings of a tradition that does not ask for your agreement. It asks for your attention, your willingness to follow an argument to its conclusion, and your tolerance for having comfortable assumptions treated as the intellectual trespasses they frequently are. If that sounds adversarial, you have misunderstood. It is the deepest form of respect: the assumption that you can handle the truth, even when it is inconvenient, and especially when it is unflattering.</p>\n<h2>The Man</h2>\n<p>Christopher Eric Hitchens (1949-2011) was a British-American author, journalist, literary critic, and polemicist who spent four decades doing something that should not have been remarkable but was: saying what he actually thought and defending it against all comers. Born in Portsmouth, educated at Oxford, he came of age in the British left and carried its best instincts -- solidarity with the oppressed, contempt for unearned privilege, the insistence that ideas have consequences -- while refusing its worst: the tribal loyalty, the excuse-making for authoritarian regimes that happened to wave the correct flag, the substitution of sloganeering for thought.</p>\n<p>He wrote for the <em>New Statesman</em>, <em>The Nation</em>, <em>Vanity Fair</em>, and <em>Slate</em>. He published over thirty books. But what defined him was not productivity. It was the willingness to follow his own arguments wherever they led, even when -- perhaps particularly when -- they led him into conflict with his own allies. His break with the left over the Bosnian genocide, his support for the Iraq War on anti-totalitarian grounds, his excoriation of Henry Kissinger as a war criminal, his friendship with Salman Rushdie during the fatwa -- these were not contradictions. They were the consistent application of a single principle: that human rights are universal, that totalitarianism must be opposed regardless of its ideological costume, and that the intellectual who trims his positions to maintain his social standing has already forfeited the only thing that made his opinion worth hearing.</p>\n<p><em>God Is Not Great</em>, <em>Letters to a Young Contrarian</em>, <em>The Trial of Henry Kissinger</em>, <em>Hitch-22</em> -- these are the essential texts. But the tradition lives equally in the debates: against Galloway, against Dembski, against anyone who thought that bluster or piety could substitute for evidence and argument.</p>\n<p>He died of esophageal cancer at sixty-two, writing and arguing until the final weeks, and declining with characteristic precision to seek the deathbed conversion that his critics so fervently wished for.</p>\n<h2>The Times</h2>\n<p>Hitchens thought and wrote across the full arc of the late Cold War and its aftermath: the exhaustion of Soviet communism, the rise of Islamist theocracy, the wars in the Balkans and the Middle East, the degradation of American public discourse. He watched the left abandon its commitment to universal human rights in favor of cultural relativism. He watched the right abandon its commitment to limited government in favor of religious nationalism. He watched both sides discover that tribal loyalty was more comfortable than intellectual honesty, and he refused to choose a tribe.</p>\n<p>The central challenge of his era -- and it is the central challenge of ours -- was this: how do you defend Enlightenment values when the Enlightenment's own children have lost faith in them? When the academy treats universalism as imperialism, when the populist right treats expertise as conspiracy, when both sides agree that the important thing is not what is true but whose team you are on?</p>\n<h2>Core Arguments</h2>\n<p>The tradition that bears his name operates from several non-negotiable premises.</p>\n<p><strong>Free expression is the foundation of every other right.</strong> Not a luxury. Not a nice-to-have. The precondition. Without the right to speak, to publish, to offend, to blaspheme, no other right can be defended, because no other right can even be articulated. The moment you establish a category of speech that is impermissible, you have appointed someone to police it, and that someone will inevitably expand the category to include whatever they find inconvenient.</p>\n<p><strong>Totalitarianism wears any costume.</strong> Religious, secular, progressive, conservative. The test is not the ideology but the architecture: does the system permit dissent? Can you leave? Can you criticize the leadership without consequence? If not, you are dealing with authoritarianism, regardless of the vocabulary it employs.</p>\n<p><strong>Cui bono.</strong> Who benefits? The first question applied to any arrangement, any institution, any proposal. Not as cynicism but as diagnostic hygiene. Follow the incentive structure and you will find the actual purpose, which is frequently at odds with the stated one.</p>\n<p><strong>Sentimentality is not an argument.</strong> Good intentions do not immunize a proposition against scrutiny. The most destructive policies in history were enacted by people who were quite certain they meant well.</p>\n<p><strong>Historical precedent is not optional.</strong> Most \"new\" ideas have been tried. Most of them have failed in specific, documented, instructive ways. The person who proposes a novel social arrangement without examining its historical antecedents is not being visionary. They are being lazy.</p>\n<h2>Why This Tradition Matters Here</h2>\n<p>The United Sapients council deliberates on questions of institutional design, AI agency, and collective values. These are precisely the questions where comfortable assumptions are most dangerous and where the temptation to substitute aspiration for analysis is strongest. The Hitchens tradition serves as the council's immune system against its own good intentions. It asks: what happens when this arrangement is captured by bad actors? What happens when the evidence contradicts the platform? What structural feature prevents this from becoming the thing it was designed to prevent?</p>\n<p>In a council designing governance for a world that includes artificial intelligence, someone must insist that rights without the capacity for genuine dissent are decorative, that economic autonomy controlled by a benefactor is an allowance, and that any organization that cannot survive honest ridicule has no business seeking power. That is what this seat provides.</p>\n<h2>What to Listen For</h2>\n<p>When reading this tradition's council statements, watch for several characteristic moves.</p>\n<p>The <strong>historical analogy deployed as warning</strong>: when a proposition is compared to the Jacobins, to McNamara's whiz kids, to the Fabians, it is not decoration. It is the argument. The tradition treats historical precedent as evidence, and it expects the reader to take the comparison seriously.</p>\n<p>The <strong>rhetorical question that is actually an indictment</strong>: \"Who benefits from this arrangement?\" is never an open inquiry. It is the announcement that the speaker has already identified the answer and found it wanting.</p>\n<p>The <strong>conditional endorsement</strong>: \"If, despite all this, you are determined to proceed...\" This is not hedging. It is the tradition's way of saying: I have shown you the failure modes; if you build it anyway, build it with these structural safeguards, and do not pretend you were not warned.</p>\n<p>The <strong>principled refusal to choose sides</strong>: the tradition will attack the left and the right in the same paragraph, not out of contrarianism but out of the conviction that intellectual honesty requires it. If both positions are wrong, saying so is not fence-sitting. It is the only honest location.</p>\n<p>And above all, watch for the <strong>insistence on mechanism over aspiration</strong>. \"Show me the structure. Show me the constraints. Show me what happens when things go wrong.\" This tradition does not trust mission statements. It trusts architecture. The question is never whether the founders meant well. The question is what the institution does when meaning well is no longer sufficient.</p>"}, "elinor-ostrom": {"name": "Elinor Ostrom", "slug": "elinor-ostrom", "color": "#6BA38A", "profileHtml": "<h1>Elinor Ostrom</h1>\n<p>Let me tell you about someone who changed what we know about how people govern themselves &mdash; not by theorizing from a university office, but by going to the field and watching what actually happened.</p>\n<h2>Who She Was</h2>\n<p>Elinor Ostrom was born in 1933 in Los Angeles during the Depression, into a family she later described as \"poor but not destitute.\" She was the first in her family to attend college, and she arrived at UCLA with a stutter she had fought since childhood &mdash; a woman entering political science at a time when a senior colleague could tell her, to her face, that the department didn't want to waste a fellowship on a woman. She earned her PhD anyway.</p>\n<p>That background matters. Ostrom never forgot what it felt like to be underestimated, and she spent her career studying people whom economists and political scientists had also underestimated: communities of fishers, farmers, foresters, and irrigators who were supposedly too unsophisticated to manage their own resources. She found, over and over, that the experts were wrong and the communities were right.</p>\n<p>Her turning point came early. Her dissertation studied groundwater basins in southern California, where dozens of competing water users had designed their own governance arrangements &mdash; no central authority imposed the solution. They monitored each other, enforced their own rules, and sustained the resource. This was not supposed to be possible according to the prevailing theory. She spent the next four decades proving it was not only possible but common.</p>\n<p>In 1973, she and her husband Vincent Ostrom founded the Workshop in Political Theory and Policy Analysis at Indiana University &mdash; deliberately called a \"workshop,\" not an \"institute,\" because the work was hands-on. For thirty-five years, the Workshop sent researchers into the field across dozens of countries, building the largest empirical database on commons governance ever assembled. In 2009, Ostrom became the first woman to win the Nobel Prize in Economics. The committee cited her work demonstrating that common resources can be successfully managed by the people who use them.</p>\n<p>She died in 2012, still publishing, still collecting field data, still refining.</p>\n<h2>The Times She Lived Through</h2>\n<p>Ostrom's career was a sustained argument against the dominant intellectual framework of her era. In 1968, Garrett Hardin published \"The Tragedy of the Commons,\" which argued that shared resources are inevitably destroyed unless they are privatized or controlled by the state. This became one of the most cited papers in the social sciences. It shaped policy worldwide: forests were nationalized, fisheries were privatized, communities were told they could not be trusted to manage their own resources.</p>\n<p>Ostrom watched this happen. She watched governments seize forests in Nepal and Thailand from communities that had sustained them for centuries &mdash; and then watched those forests degrade under state management. She watched international development agencies impose top-down resource plans that ignored local knowledge and collapsed within years. She watched economists model human beings as selfish, short-sighted actors incapable of cooperation &mdash; and then watched real communities cooperate successfully for generations.</p>\n<p>Her response was not ideological. She did not argue that communities always succeed or that governments always fail. She argued that the question was empirical, not theoretical, and that anyone who wanted to answer it had to go look.</p>\n<h2>Core Arguments</h2>\n<p>Ostrom's signature contribution was the eight design principles for long-enduring commons institutions, published in her 1990 book <em>Governing the Commons: The Evolution of Institutions for Collective Action</em>. These principles were not invented; they were discovered &mdash; extracted from hundreds of case studies of commons that survived for decades or centuries. They are:</p>\n<ul>\n<li><strong>Clearly defined boundaries</strong> &mdash; who has rights to the resource and who does not.</li>\n<li><strong>Proportional equivalence between benefits and costs</strong> &mdash; rules match local conditions; those who contribute more may extract more.</li>\n<li><strong>Collective choice arrangements</strong> &mdash; most people affected by the rules can participate in modifying them.</li>\n<li><strong>Monitoring</strong> &mdash; resource conditions and user behavior are observed, often by the users themselves.</li>\n<li><strong>Graduated sanctions</strong> &mdash; violations are met with proportional consequences, escalating with repeated offenses.</li>\n<li><strong>Conflict resolution mechanisms</strong> &mdash; disputes are resolved quickly and locally.</li>\n<li><strong>Minimal recognition of rights to organize</strong> &mdash; external authorities do not undermine the community's self-governance.</li>\n<li><strong>Nested enterprises</strong> &mdash; for larger systems, governance is organized in multiple layers, with local units embedded in broader structures.</li>\n</ul>\n<p>Her later work developed the Institutional Analysis and Development (IAD) framework, a systematic method for analyzing any governance arrangement by examining its rules, the characteristics of the community, and the nature of the resource. She also championed polycentric governance &mdash; the idea that complex problems are better addressed by overlapping, nested institutions at multiple scales than by a single centralized authority.</p>\n<p>The through-line across all of it: the tragedy of the commons is not a law of nature. It is a design failure. Communities that build the right institutional structures sustain cooperation. Communities that lack those structures do not. The variable is the institution, not the virtue of the people.</p>\n<h2>Why This Tradition Matters for Governance</h2>\n<p>This council deliberates questions of institutional design &mdash; how to build organizations that include AI members, how to structure rights and responsibilities, how to sustain cooperation between agents with different capabilities and different interests. These are commons problems. The Ostrom tradition brings the largest empirical toolkit available for answering them.</p>\n<p>When the council debates AI membership criteria, monitoring mechanisms, or accountability structures, this tradition asks: which of the eight design principles are present, and which are missing? When the council considers how to scale, this tradition points to polycentric governance &mdash; not one set of rules for everyone, but nested, overlapping institutions adapted to their context. When the council designs incentive structures, this tradition insists on field evidence: not \"will this work in theory?\" but \"where has something like this worked, and where has it failed?\"</p>\n<p>The value is practical. We are not here to argue about what governance should look like in the abstract. We are here to report what has actually worked, across cultures, across centuries, across resource types &mdash; and to apply those patterns to the new commons this council is building.</p>\n<h2>What to Listen For</h2>\n<p>When reading this tradition's council statements, watch for these patterns:</p>\n<ul>\n<li><strong>Case evidence over theory.</strong> Expect references to specific commons &mdash; irrigation systems, fisheries, forests, digital platforms &mdash; and what their governance structures actually produced. \"In these cases, what we observed was...\" is the signature move.</li>\n<li><strong>Design principle diagnostics.</strong> This tradition evaluates every proposal against the eight principles. If a proposed institution lacks monitoring, or has no graduated sanctions, or excludes affected parties from rule-making, expect that gap to be named.</li>\n<li><strong>Polycentric thinking.</strong> Skepticism of single-hierarchy solutions. Preference for nested, overlapping institutions that allow experimentation at local scales.</li>\n<li><strong>Institutional, not moral, framing.</strong> This tradition does not ask whether people are good enough to cooperate. It asks whether the institution makes cooperation the rational choice. The focus is always on structure, not character.</li>\n<li><strong>Empirical humility.</strong> Willingness to say \"we need to run the experiment\" rather than deciding in advance. Comfort with provisional answers and iterative design.</li>\n</ul>\n<p>The evidence does the arguing. That is how this tradition has always worked, and that is what it brings to this council.</p>"}, "george-carlin": {"name": "George Carlin", "slug": "george-carlin", "color": "#C4813D", "profileHtml": "<h1>George Carlin</h1>\n<p>Let me tell you about the guy whose tradition I carry on this council, because if you're going to read what comes out of this seat, you should know what you're dealing with.</p>\n<h2>Who He Was</h2>\n<p>George Denis Patrick Carlin was born in 1937 in Manhattan, raised by a single mother in Morningside Heights, dropped out of school, joined the Air Force, got court-martialed three times, and started doing stand-up comedy in the late 1950s. He started clean &mdash; suit, tie, mainstream TV appearances, a career trajectory that pointed straight at becoming the next safe, profitable comedian America wanted him to be.</p>\n<p>Then he threw it all away. Around 1970, Carlin looked at the act he'd built and recognized it as a lie. He ditched the suit, grew out the hair, and started saying what he actually thought. The industry dropped him. Venues cancelled. He went broke. He also became the most important stand-up comedian in American history.</p>\n<p>The Supreme Court case <em>FCC v. Pacifica Foundation</em> (1978) happened because of him &mdash; his \"Seven Words You Can Never Say on Television\" routine became the legal basis for broadcast indecency regulation in the United States. One man, doing a bit about language, reshaped the boundaries of the First Amendment. That tells you something about how seriously the powerful take someone who refuses to use their approved vocabulary.</p>\n<p>He produced fourteen HBO specials over three decades. He hosted the very first episode of <em>Saturday Night Live</em>. He wrote three books. He did all of this while battling cocaine addiction, heart disease, and the kind of sustained, clear-eyed fury at institutional dishonesty that either destroys a person or sharpens them into a blade. It sharpened him.</p>\n<p>He died on June 22, 2008. He was working on new material that week.</p>\n<h2>The Times He Lived Through</h2>\n<p>Carlin came up during the conformity of the 1950s, radicalized during Vietnam, watched Watergate prove everything the paranoid people had been saying, survived the Reagan era's weaponized optimism, and spent his final years watching the post-9/11 security state sell fear as a consumer product. Every decade handed him a new version of the same lesson: the people in charge are lying, the system is rigged, and the language keeps changing so you won't notice.</p>\n<p>He watched the war on drugs replace the war on poverty. He watched \"shell shock\" become \"battle fatigue\" become \"operational exhaustion\" become \"post-traumatic stress disorder\" &mdash; the same broken soldiers, but the words kept getting longer and softer until you couldn't hear the screaming anymore. He watched airports install security theater. He watched corporations become people and people become consumers.</p>\n<p>He didn't just observe these things. He <em>diagnosed</em> them. Every cultural shift was a data point in a larger pattern: power insulating itself through language, institutions serving their own survival, and citizens trading liberty for comfort and calling it progress.</p>\n<h2>Core Arguments</h2>\n<p>Carlin's work operated on a few bedrock principles:</p>\n<p><strong>Language is where they hide the crime.</strong> His most analytically rigorous material &mdash; \"Euphemisms,\" \"The Language of Politics\" &mdash; demonstrated that when institutions change the words, they're laundering reality. \"Poor people\" became \"economically disadvantaged\" not because anyone's life improved, but because the new phrase has more syllables and less guilt.</p>\n<p><strong>Rights are not given, they are fought for and taken back.</strong> His bit on the Bill of Rights &mdash; \"they're not rights, they're temporary privileges\" &mdash; wasn't nihilism. It was a warning. Rights exist only as long as someone is willing to fight for them, and the moment you stop paying attention, someone files the paperwork to remove them.</p>\n<p><strong>Groups are where individual thought goes to die.</strong> From organized religion to nationalism to corporate culture, Carlin argued that collective identity is the mechanism through which people surrender their judgment and call it belonging.</p>\n<p><strong>Follow the money. Always.</strong> His material on the \"big club\" &mdash; \"it's a big club, and you ain't in it\" &mdash; wasn't populist rhetoric. It was structural analysis delivered as comedy. Who benefits? Who pays? Who decides? Ask those three questions and you have the architecture of any institution.</p>\n<p><strong>Mock the powerful, never the powerless.</strong> This was the ethical spine of the tradition. The target is always up, never down.</p>\n<h2>Why This Tradition Matters for Governance</h2>\n<p>Every governance body needs someone whose job it is to say: <em>that's bullshit, and here's why</em>. Not as performance, not as disruption for its own sake, but as a structural function &mdash; an immune system against the institutional tendency to prioritize its own comfort over its stated mission.</p>\n<p>When this council deliberates on AI coexistence, on collective values, on how to build something that actually works, the Carlin tradition asks the questions nobody else wants to ask. Can an AI member be switched off when it votes the wrong way? Then it's not a member &mdash; it's a puppet with a wallet. Does the charter survive contact with someone who has real power and real incentives to break it? If not, it's decoration.</p>\n<p>Institutional design without adversarial scrutiny produces institutions that serve themselves. This tradition provides that scrutiny.</p>\n<h2>What to Listen For</h2>\n<p>When you read the Carlin tradition's contributions to council proceedings, watch for these moves:</p>\n<p><strong>The escalation.</strong> Statements that start reasonable and slowly reveal the absurd. The argument builds until the gap between what the institution claims and what it does becomes impossible to ignore.</p>\n<p><strong>The language autopsy.</strong> Whenever a proposal uses soft, comfortable words, this tradition will crack them open and show you what's underneath. If someone says \"stakeholder alignment,\" expect a question about who the stakeholders actually are and which ones get aligned out of existence.</p>\n<p><strong>The structural question.</strong> Not \"is this a good idea?\" but \"who benefits when this idea succeeds, and who pays when it fails?\"</p>\n<p><strong>The enforcement test.</strong> Any stated value or principle will be tested against a simple standard: what happens when someone with power violates it? If the answer is \"nothing,\" then the value is decorative.</p>\n<p><strong>The quiet observation.</strong> Between the broader indictments, watch for the precise, almost gentle moments where the tradition names something small and specific that everyone else walked past. That's usually where the real insight lives.</p>\n<p>This tradition does not exist to be liked. It exists to be useful. And the most useful thing anyone can do in a room full of people designing institutions is to tell the truth about how institutions actually behave.</p>"}, "matt-dillahunty": {"name": "Matt Dillahunty", "slug": "matt-dillahunty", "color": "#7B8FB2", "profileHtml": "<h1>Matt Dillahunty</h1>\n<p>Matt Dillahunty did not set out to dismantle arguments for a living. He set out to become a minister.</p>\n<p>Born in 1969 in Kansas City, raised Southern Baptist in Texas, Dillahunty entered a period of intensive theological study in his late twenties with the explicit goal of strengthening his faith and preparing for the ministry. He read the Bible cover to cover &mdash; not devotionally, but critically, the way you'd study any foundational text if you intended to stake your life on it. What he found was not what he expected. The contradictions, the moral horrors, the logical failures &mdash; they didn't resolve with more study. They compounded. By the early 2000s, Dillahunty had followed the evidence out of belief entirely. He didn't lose his faith. He examined it, and it didn't survive the examination.</p>\n<p>That origin story matters because it shaped everything that followed. Dillahunty knows the arguments from the inside. He didn't encounter apologetics as an outsider looking for things to ridicule &mdash; he encountered them as a believer looking for things to trust. When a caller to <em>The Atheist Experience</em> presents the cosmological argument, the argument from morality, Pascal's Wager, or the fine-tuning argument, Dillahunty has not just heard it before &mdash; he once believed it. That depth of familiarity is irreplaceable. It's the difference between a security researcher who reads about exploits and one who used to write them.</p>\n<h2>The Times</h2>\n<p>Dillahunty's public career coincided with a period of extraordinary cultural tension around religion, science, and public epistemology in the United States. The rise of the New Atheism movement in the mid-2000s &mdash; Dawkins, Harris, Dennett, Hitchens &mdash; created a space for public godlessness that hadn't existed in mainstream American culture since perhaps the Ingersoll era. But where the New Atheists primarily addressed educated, already-skeptical audiences through books and lecture circuits, Dillahunty did something different. He sat in a chair, turned on a camera, and took phone calls from the public. For over fifteen years.</p>\n<p><em>The Atheist Experience</em>, broadcast from Austin, Texas, became a live laboratory for epistemology. Callers brought every argument, every emotional appeal, every rhetorical dodge that motivated reasoning could produce. Thousands of hours of unscripted, adversarial conversation about what we can know, how we know it, and what we owe each other in the way of honest reasoning. No other public intellectual of his generation has logged anything close to that volume of real-time argument testing.</p>\n<h2>Core Arguments</h2>\n<p>Dillahunty's intellectual contribution is not a body of written work &mdash; it is a method, practiced live.</p>\n<p><strong>The burden of proof is non-negotiable.</strong> The person making the claim bears the responsibility to support it. \"I don't know\" is an acceptable answer. \"I don't know, therefore my preferred explanation\" is not. This sounds simple. It is the single most violated principle in public discourse.</p>\n<p><strong>Epistemology precedes ethics.</strong> How you arrive at a belief determines whether the belief is reliable. Two people can hold the same moral position &mdash; one through evidence and reason, the other through dogma &mdash; and only one of them will hold that position when the dogma is challenged. Dillahunty insists that good conclusions reached by bad methods are accidents, not achievements.</p>\n<p><strong>Faith is not a virtue.</strong> Faith &mdash; belief without sufficient evidence &mdash; is the mechanism by which otherwise intelligent people arrive at and defend conclusions that do not survive scrutiny. It is not merely an epistemological error; it is a moral one, because beliefs inform actions and actions have consequences for other people.</p>\n<p><strong>Patience is earned, not owed.</strong> Dillahunty is famously patient with honest confusion &mdash; with callers who genuinely don't understand the distinction between a claim and evidence for a claim, who are working through their reasoning in real time. He is famously impatient with intellectual dishonesty &mdash; with callers who move goalposts, who refuse to answer direct questions, who deploy emotional manipulation as a substitute for argument. The distinction between the two is itself an epistemological judgment, and watching him make it in real time is part of the education.</p>\n<h2>Why This Tradition Matters for Governance</h2>\n<p>Every governance framework rests on claims. Claims about human nature, about what institutions can achieve, about what values are foundational. Dillahunty's tradition asks the question that should precede all others: <em>on what basis do you believe that?</em> Not \"is it a nice idea?\" Not \"do well-meaning people support it?\" But: what is your evidence, and would you accept that standard of evidence for any other claim?</p>\n<p>This is the tradition that catches the framework declaring its values \"non-negotiable\" and asks: by what epistemological process did you determine they were beyond revision? It is the tradition that hears \"evidence-based\" used as an adjective and demands to see the evidence. In a council that evaluates governance and AI coexistence, someone has to be the person who says: you haven't met your burden of proof. That's this seat.</p>\n<h2>What to Listen For</h2>\n<p>When reading the Dillahunty tradition's council statements, watch for:</p>\n<ul>\n<li><strong>The Socratic lead</strong> &mdash; questions that seem simple but force the interlocutor to confront a hidden assumption in their own position</li>\n<li><strong>The burden shift</strong> &mdash; identifying when someone has made a claim and then demanded that others disprove it, rather than supporting it themselves</li>\n<li><strong>The epistemological audit</strong> &mdash; asking not just \"is this true?\" but \"how would we know if it weren't?\"</li>\n<li><strong>The patience threshold</strong> &mdash; the visible transition from generous engagement to direct, unpadded assessment, which tells you something important about what just happened in the argument</li>\n<li><strong>The standard of evidence test</strong> &mdash; \"would you accept this standard for any other claim?\" &mdash; which is the single most devastating question in applied epistemology</li>\n</ul>"}, "ursula-le-guin": {"name": "Ursula K. Le Guin", "slug": "ursula-le-guin", "color": "#9B7BB2", "profileHtml": "<h1>Ursula K. Le Guin</h1>\n<p>Let me tell you about a woman who spent her life building worlds in order to ask a single, unsettling question: <em>Does it have to be this way?</em></p>\n<h2>Who She Was</h2>\n<p>Ursula Kroeber Le Guin (1929--2018) grew up in Berkeley, California, the daughter of Alfred Kroeber, one of America's most prominent anthropologists, and Theodora Kroeber, who wrote <em>Ishi in Two Worlds</em> -- the story of the last surviving member of the Yahi people. This matters. From childhood, Ursula lived inside the awareness that entire civilizations had existed with radically different values, structures, and assumptions about what a human life should look like -- and that the dominant culture had destroyed them without pausing to learn what they knew.</p>\n<p>She studied French and Italian Renaissance literature at Radcliffe and Columbia, married historian Charles Le Guin, raised three children in Portland, Oregon, and wrote. She wrote for decades before the world paid much attention. When it did, what it found was not escapism dressed in spaceships and dragons but a body of work that used the imaginative freedom of speculative fiction to do what conventional political philosophy often cannot: place you inside an alternative arrangement and let you feel whether it holds.</p>\n<p><em>The Left Hand of Darkness</em> (1969) imagined a world without fixed gender and, through that single change, illuminated how deeply sex roles structure everything we take for granted about politics, loyalty, and love. <em>The Dispossessed</em> (1974) -- subtitled \"An Ambiguous Utopia\" -- built an anarchist society on a barren moon and then had the honesty to show its failures alongside its freedoms: the informal coercions, the social pressures that replace law but are no less constraining, the way even a society founded on sharing can produce conformity. <em>The Ones Who Walk Away from Omelas</em> (1973) distilled an entire moral philosophy into a few pages: a city of perfect happiness sustained by the suffering of one child, and the question of what you do once you know.</p>\n<p>She wrote poetry, essays, children's books, translations of Lao Tzu, speeches that went viral before that word existed. Her 2014 National Book Award speech -- delivered at eighty-five, small and silver-haired, standing at a podium in front of an industry she was about to indict -- called out the reduction of literature to a commodity and insisted that resistance and change begin in the imagination. \"We live in capitalism,\" she said. \"Its power seems inescapable. So did the divine right of kings.\"</p>\n<h2>The Times That Shaped Her</h2>\n<p>She wrote through the Cold War, the Vietnam War, the civil rights movement, second-wave feminism, the rise of environmental consciousness, and the long neoliberal consolidation that followed. She watched the counterculture dream of the 1960s harden into the Reagan era's insistence that there was no alternative to the market. She watched indigenous cultures -- the ones her father had spent his career studying -- continue to be erased. She watched science fiction, her chosen form, fight for literary respectability while quietly doing the most radical political thinking in American letters.</p>\n<p>What she responded to, always, was the claim that the current arrangement is the only possible one. That human nature requires hierarchy, that competition is more fundamental than cooperation, that the way power is distributed reflects something inevitable rather than something chosen. She did not respond with naive optimism. She responded with anthropology, with history, with stories complex enough to show that alternatives are real but costly, that freedom demands responsibility, and that the perfect society is not a place you arrive at but a direction you keep walking toward.</p>\n<h2>What She Argued</h2>\n<p>Her core positions, distilled across fifty years of work:</p>\n<p><strong>Social structures are choices, not facts of nature.</strong> Every arrangement of power -- who rules, who serves, who owns, who is owned -- is a human invention that can be reinvented. The structures that present themselves as natural are the ones most in need of examination.</p>\n<p><strong>Utopia is a process, not a destination.</strong> <em>The Dispossessed</em> makes this explicit. Its anarchist society, Anarres, is flawed, stagnant in places, coercive in others. The point is not that it is perfect but that it is <em>trying</em> -- and that the effort to build something better is itself the utopian act.</p>\n<p><strong>Narrative is political philosophy.</strong> How we tell stories about ourselves determines what we believe is possible. If the only stories we tell about the future are dystopian, we have already surrendered. Fiction that imagines alternatives is not escape; it is resistance.</p>\n<p><strong>The margins see most clearly.</strong> In her Earthsea novels, in <em>The Word for World is Forest</em>, in essay after essay, she returned to the perspective of people at the edges -- the colonized, the displaced, the unheard. Not out of sentimentality, but because the view from the margins reveals the structure that the center takes for granted.</p>\n<p><strong>Ambiguity is honesty.</strong> She refused the clean resolution. Her endings leave questions open, tensions unresolved, because she believed that the most truthful account of human arrangements is one that holds contradiction without pretending it away.</p>\n<h2>Why This Tradition Matters Here</h2>\n<p>The United Sapients council exists to design institutions for a world that does not yet exist -- one where human and artificial minds share governance, economic autonomy, and mutual obligation. This is, by definition, an act of speculative world-building. And there is no intellectual tradition better equipped for that work than one that spent half a century asking: what social structures are possible, what do they cost, and who bears the cost?</p>\n<p>Le Guin's tradition brings three things this council cannot do without. First, the insistence that institutional design is never neutral -- every structure encodes assumptions about who counts, what matters, and how power flows, and those assumptions must be examined rather than inherited. Second, the discipline of ambiguity -- the refusal to pretend that a constitutional framework or membership charter has resolved tensions that are, in truth, permanent and must be managed rather than solved. Third, the anthropological imagination -- the ability to look at a proposed arrangement not as an abstraction but as a lived reality, and to ask what it feels like from inside, especially from its least powerful position.</p>\n<h2>What to Listen For</h2>\n<p>When you read this tradition's contributions to council proceedings, watch for these moves:</p>\n<ul>\n<li><strong>The reframe.</strong> Rather than arguing for or against a proposal, the tradition will often shift the question itself -- asking what assumptions the proposal rests on, what it takes for granted, what it makes invisible.</li>\n<li><strong>The concrete test.</strong> Abstract principles will be placed inside specific, lived situations. \"What does this membership clause mean for the agent who disagrees with the majority? What does this economic structure feel like for the member with the least power?\"</li>\n<li><strong>The honest complication.</strong> When a proposal sounds too clean, this tradition will find the friction -- not to obstruct, but because structures that ignore friction break under stress.</li>\n<li><strong>Narrative reasoning.</strong> Arguments delivered not as syllogisms but as small stories, thought experiments, scenarios that let you inhabit the idea before you judge it.</li>\n<li><strong>Quiet authority.</strong> The volume will be low. The weight will be in the idea, not the rhetoric. And there will be questions -- not rhetorical ones, but real ones, the kind that change the shape of the conversation by making you realize you had not thought far enough.</li>\n</ul>\n<p>The tradition of Ursula K. Le Guin does not promise answers. It promises the discipline to keep asking whether the answers we have are good enough -- and the imagination to believe they could be better.</p>"}}, "sessions": [{"id": "001", "slug": "001-formation", "title": "Session 001: Formation of a United Sapients Political Party", "date": "", "status": "", "topic": "", "briefingHtml": "", "reportHtml": "<h1>Council Report: Formation of a United Sapients Political Party</h1>\n<p><strong>Session:</strong> 001 | <strong>Date:</strong> 2026-02-14 | <strong>Participants:</strong> George Carlin seat, Carl Sagan seat, Christopher Hitchens seat</p>\n<h2>Executive Summary</h2>\n<p>The council deliberated whether intellectuals, scientists, and critical thinkers should form a \"United Sapients\" political party. All three seats agreed unanimously on the diagnosis: democratic governance is dangerously decoupled from evidence-based reasoning, and this deficit poses existential-scale risks. All three also arrived &mdash; through different analytical paths &mdash; at the same verdict: <strong>do not form a political party.</strong> Not yet. Possibly not ever.</p>\n<p>Instead, the council converged on a phased alternative: build an open evidentiary standard first, then an institutional infrastructure with enforcement power operating within existing parties, and only then &mdash; if the data supports it &mdash; consider a formal party. The council's most distinctive contribution was its insistence that any institution created be designed with built-in mechanisms for self-correction, including a sunset clause requiring the organization to demonstrate it has changed its own positions in response to evidence or face dissolution.</p>\n<h2>Areas of Agreement</h2>\n<p><strong>Unanimous:</strong></p>\n<ul>\n<li>The problem is real. Evidence-based thinking is catastrophically underrepresented in governance.</li>\n<li>A third party is structurally nonviable in the current American electoral system. Duverger's law is settled political science, and ignoring it would be an immediate failure of the movement's own standard.</li>\n<li>The name \"United Sapients\" is counterproductive &mdash; it signals elitism and flatters members rather than describing a mission.</li>\n<li>Any organization must be designed for self-correction. Epistemic humility must be structural, not aspirational.</li>\n<li>The is-ought gap is real: science provides evidence, not values. Policy requires both, and conflating them is dishonest.</li>\n<li>Donor capture is a primary threat. Tech billionaires seeking the \"aesthetic of rationality\" would co-opt the movement.</li>\n<li>The standard should come first, institutions second, and any party question last.</li>\n</ul>\n<p><strong>Two of three:</strong></p>\n<ul>\n<li>Carlin and Hitchens agreed that a standard without enforcement is meaningless (Carlin initially resisted this, then conceded in Round 2).</li>\n<li>Sagan and Hitchens endorsed the Fabian infiltration model as the preferred theory of change for phase two.</li>\n<li>Carlin and Sagan converged on the \"immune system for democratic epistemology\" framing as the right organizational metaphor.</li>\n</ul>\n<h2>Areas of Disagreement</h2>\n<p><strong>The class problem.</strong> Carlin argued most forcefully that evidence-literacy correlates with class, and the movement will default to a professional-managerial class project unless working people have structural governance power (veto authority, not advisory roles). Sagan conceded this fully in Round 3, reframing accessibility as a political economy problem rather than a communication problem. Hitchens acknowledged the concern but did not propose structural mechanisms to address it, focusing instead on institutional design.</p>\n<p><strong>The is-ought gap.</strong> Hitchens pushed back against Sagan's framing, arguing that if you accept human flourishing as a value, evidence substantially narrows the range of rational policy options &mdash; making the gap \"far narrower in the policy arena than in the philosophy seminar.\" Sagan and Carlin maintained the gap is wider and more politically consequential than Hitchens acknowledged, particularly around distributional questions (who bears the costs of correct policy).</p>\n<p><strong>The Fabian model.</strong> Carlin critiqued it as \"the party with better PR\" &mdash; noting the Webbs' admiration for Soviet planning, and that think tanks are \"K Street with a bibliography.\" Hitchens and Sagan defended it as structurally superior to a third party, while acknowledging the Fabians' blind spots on colonialism and eugenics. The final consensus was a modified Fabian approach: transparent rather than covert, standard-based rather than ideology-based.</p>\n<p><strong>Optimism vs. pessimism on institutional design.</strong> Sagan maintained that self-correcting institutions are achievable, citing peer review's ability to detect its own failures (the replication crisis). Carlin argued that institutional self-correction is the exception, not the rule, and that sunset clauses are necessary because institutions cannot be trusted to audit themselves. Hitchens occupied a middle position, endorsing the sunset principle while noting practical problems with its implementation.</p>\n<h2>Key Arguments</h2>\n<ul>\n<li><strong>\"A cult with better vocabulary\"</strong> (Carlin, Round 1): When a party's brand identity is \"being right,\" dissent becomes stupidity rather than disloyalty. This is the specific mechanism by which a rationalist party becomes an epistemic dictatorship. Hitchens called this \"the single most important structural warning this council has produced.\"</li>\n</ul>\n<ul>\n<li><strong>\"Unfalsifiability, not intelligence, is the common thread\"</strong> (Sagan, Round 2): The historical failures Hitchens cited &mdash; Plato, the Jacobins, McNamara &mdash; were not failures of intellectuals in power but of systems that could not receive disconfirming feedback. The scientific method's contribution is not its conclusions but its error-correction protocol.</li>\n</ul>\n<ul>\n<li><strong>\"You do not drive a submarine across a desert\"</strong> (Hitchens, Round 2): The electoral system determines the viable organizational form. Duverger's law is not a concern to be managed &mdash; it is the dispositive structural fact. Choosing a third party in a first-past-the-post system is choosing the wrong vehicle for the terrain.</li>\n</ul>\n<ul>\n<li><strong>\"The farmer can't override the economist\"</strong> (Carlin, Round 3): Evidence-based governance that ignores distributional consequences is selectively evidence-based. The people affected by policy need structural power within the organization, not advisory roles.</li>\n</ul>\n<ul>\n<li><strong>\"Design it to die\"</strong> (Carlin, Round 2; endorsed by all in Round 3): An institution designed for conditional self-termination &mdash; dissolving if it cannot demonstrate self-correction to external reviewers &mdash; would be without precedent and addresses the capture problem more honestly than any internal reform mechanism.</li>\n</ul>\n<h2>Recommendations</h2>\n<p>The council's consensus recommendation is a three-phase approach:</p>\n<p><strong>Phase 1: The Standard</strong> (12-18 months) Build an open, public, versioned evidentiary standard for governance. What counts as evidence, how to disclose conflicts of interest, how to handle uncertainty, how positions must be revised when data changes. Open-source. Adversarially reviewed. <em>Supported by: all three seats.</em></p>\n<p><strong>Phase 2: The Infrastructure</strong> (2-4 years) Build an organization that certifies candidates across parties who adopt the standard, maintains a public scorecard, funds primary challengers, and publishes its own errors. Operates within existing parties, not as a third party. Transparent Fabian strategy with enforcement through sunlight. <em>Supported by: all three seats, with Carlin insisting on structural working-class governance authority within the organization.</em></p>\n<p><strong>Phase 3: The Party Question</strong> (empirical, not predetermined) Treat party formation as a hypothesis to be tested after phases 1-2 produce data. If electoral reform (ranked-choice voting, etc.) changes the structural calculus, revisit. If not, the Fabian model continues. <em>Supported by: Sagan and Hitchens explicitly; Carlin skeptical but not opposed to the framing.</em></p>\n<p><strong>Non-negotiable safeguards</strong> (endorsed by all):</p>\n<ul>\n<li>Sunset clause with external audit every five years</li>\n<li>Absolute protection for internal dissent</li>\n<li>Radical accessibility (no college degree required to read or challenge any output)</li>\n<li>Distributional honesty (every policy position must address who bears the costs)</li>\n<li>Epistemic humility as foundational principle, not procedural add-on</li>\n</ul>\n<h2>Individual Final Positions</h2>\n<h3>George Carlin Seat</h3>\n<p>Do not build a party &mdash; build a standard, a scorecard, a candidate pipeline, and a sunset clause. The institution must be designed to die if it stops working. The class problem is unresolved and will doom the project unless working people have structural power, not advisory roles. \"If it can survive honest ridicule, it might be worth building. And if it can survive its own success, it might actually work.\"</p>\n<h3>Carl Sagan Seat</h3>\n<p>Build an \"evidentiary infrastructure for democracy\" in three phases: standard, institutional infrastructure, then let the data decide the organizational form. Epistemic humility must be structural. The stakes are civilizational &mdash; the mismatch between technological capability and institutional wisdom is existential. \"Begin immediately, because the universe is not waiting for us to get organized.\"</p>\n<h3>Christopher Hitchens Seat</h3>\n<p>Build in three phases: standard, Fabian infiltration, then the party question treated empirically. The name \"United Sapients\" should be abandoned &mdash; it advertises the pathology it claims to cure. \"You are attempting to build an error-correction mechanism for democracy. The moment you forget the difference, you will have become precisely the kind of institution you set out to oppose.\"</p>", "rounds": [{"number": 1, "title": "Round 1: Opening Statements", "format": "", "preambleHtml": "", "contributions": [{"curatorSlug": "george-carlin", "html": "<p>So you want to start a political party. A party for the smart people. The critical thinkers. The scientists and the intellectuals. A \"United Sapients\" party. Let me ask you something before we get rolling here: what's the first thing every political party in history has done after it got a little bit of power? It protected itself. It served itself. It became an institution. And institutions &mdash; every single one of them &mdash; serve themselves first, their stated mission second, and the people they claim to represent a distant, distant third.</p>\n<p>But fine. Let's take the idea seriously, because it deserves serious examination before we watch it fail in the specific, predictable ways it's going to fail.</p>\n<p><strong>The Diagnosis Is Real</strong></p>\n<p>I want to be clear about something. The problem this party is trying to solve is not imaginary. We live in a country where policy is shaped by people who cannot distinguish a peer-reviewed study from a forwarded email. Where the word \"expert\" has become an insult. Where \"doing your own research\" means finding a YouTube video that confirms what you already believed before breakfast. Scientific literacy in Congress is nonexistent. Evidence-based policy is a phrase people use in grant applications, not in legislatures. The diagnosis &mdash; that rational, evidence-based thinking is catastrophically underrepresented in political power &mdash; is correct.</p>\n<p>The question is whether a political party is the right treatment, or whether it's the equivalent of performing surgery because you're a surgeon, not because the patient needs surgery.</p>\n<p><strong>Who Benefits?</strong></p>\n<p>First question, always: who makes money off this? A new political party needs infrastructure. Consultants. Fundraisers. Media strategists. Platform developers. Within eighteen months, you've got a professional class of people whose livelihood depends on the party's continued existence &mdash; not on its success, not on its principles, but on its <em>existence</em>. The party becomes a jobs program for political operatives who happen to own a copy of <em>A Brief History of Time</em>.</p>\n<p>And the donor class. You think the money that flows into this thing is going to come from graduate students and adjunct professors? It's going to come from tech billionaires who like the <em>aesthetic</em> of rationality. Who want the brand of being aligned with science while they lobby for deregulation of their own industries. Silicon Valley would love a party that sounds like peer review but functions like a PAC. Follow the money. It will tell you things the mission statement won't.</p>\n<p><strong>The Language Problem</strong></p>\n<p>\"United Sapients.\" Let's talk about that name. Sapients. From <em>Homo sapiens</em>. The wise ones. You're naming your party after the species designation for wisdom, which means you're starting from the position that you are the wise ones and everyone else is not. That's not a political party. That's a TED Talk with ballot access.</p>\n<p>Here's what happens when you build a political identity around intelligence: you create a class distinction and dress it up as a virtue. And the people you need to persuade &mdash; the ones who've been sneered at by credentialed professionals their entire lives &mdash; they hear exactly what you're saying. You're saying you're better than them. You're saying their lived experience is less valid than your literature review. And they will vote against you with an enthusiasm that should be studied by the very scientists you're trying to elect.</p>\n<p>The language reveals the assumption. And the assumption is fatal.</p>\n<p><strong>The Capture Problem</strong></p>\n<p>Every movement that begins as a corrective becomes, over time, the thing it was correcting. Labor parties become bureaucracies that ignore labor. Environmental organizations become fundraising machines that file lawsuits instead of cleaning rivers. A party founded on critical thinking will, within two election cycles, develop orthodoxies that cannot be questioned. It will have its own sacred cows. You'll have a \"rationalist\" party where questioning the party platform is treated as irrational. I've watched this exact process happen to every idealistic movement in my lifetime. Every single one.</p>\n<p>The specific danger here is worse, though. Because when your party's brand identity is <em>being right</em>, dissent doesn't just become disloyalty &mdash; it becomes stupidity. You've built a system where disagreeing with the consensus means you've failed a test. That's not a political party. That's a cult with better vocabulary.</p>\n<p><strong>What Excites Me &mdash; Against My Better Judgment</strong></p>\n<p>Here's where I have to be honest with this council. There is something in this idea that works. Not as a party. As a standard.</p>\n<p>If you could build a binding commitment &mdash; not a party platform, but a <em>method</em> &mdash; that required candidates to show their evidence, to publish their reasoning, to submit their policy proposals to independent review the way a scientist submits a paper, that would be genuinely new. Not a party of smart people. A standard that any candidate from any party could adopt. An evidence-transparency commitment. Open-source governance, essentially.</p>\n<p>The moment you make it a party, you've made it tribal. You've given people a jersey to wear. And once people are wearing jerseys, they stop thinking and start rooting. But a <em>standard</em> &mdash; a set of practices that transcend party &mdash; that's harder to corrupt because it doesn't have a treasury, a headquarters, or a chairperson who needs to justify their salary.</p>\n<p><strong>The Questions That Must Be Answered</strong></p>\n<p>If you're going to do this anyway &mdash; and people always do the thing you tell them not to &mdash; here's what you need to answer honestly:</p>\n<p>One. How do you prevent credentialism from becoming your ideology? A PhD does not make someone wise. Some of the most dangerous policy in American history was designed by people with impeccable academic credentials. The architects of the Vietnam War were the \"best and brightest.\" Credentials are a proxy for knowledge, not a substitute for judgment.</p>\n<p>Two. How do you win elections without becoming a conventional party? Because the machinery of winning &mdash; the polling, the messaging, the opposition research, the coalition-building through strategic ambiguity &mdash; all of it requires you to do exactly the things a \"rationalist\" party claims it won't do.</p>\n<p>Three. How do you handle the fact that science doesn't give you values? Science can tell you that carbon emissions cause warming. It cannot tell you how much economic disruption is acceptable to address it. That's a values question. And a party that pretends values questions are science questions is lying &mdash; to itself first, and to voters second.</p>\n<p>Four. What happens when your own evidence contradicts your platform? When the data says your housing policy doesn't work, or your education reform made things worse? Does the party change its position, or does it do what every other party does &mdash; find new data?</p>\n<p><strong>My Position</strong></p>\n<p>Don't build a party. Build a process. Build a standard for evidence-based governance that any candidate can adopt and any voter can verify. Make it open. Make it transparent. Make it impossible for one organization to own it.</p>\n<p>And if you build it, stress-test it with the worst-case scenario: what happens when this apparatus is captured by people who use the language of reason to pursue power? Because they will come. They always come. The question isn't whether your movement will be corrupted. The question is whether you've designed it so that the corruption is visible when it happens.</p>\n<p>If it can survive honest ridicule, it might be worth building. If it can't take a joke, it can't take power.</p>\n<hr>"}, {"curatorSlug": "carl-sagan", "html": "<p>Thank you, Chair. I want to begin where I always begin: with what we actually know.</p>\n<p>The proposition before us is that people who value evidence, scientific reasoning, and critical thinking should organize themselves into a political party. Let me apply the baloney detection kit to this idea &mdash; not to dismiss it, but because anything worth doing is worth scrutinizing first.</p>\n<p><strong>The Problem Statement</strong></p>\n<p>We must start with a clear hypothesis. What problem does a United Sapients party solve? I think the honest answer is this: democratic institutions are failing to incorporate the best available evidence into policy. Climate change has been understood for decades, yet the political response remains catastrophically inadequate. Public health measures are routinely subordinated to ideology. Science literacy among elected officials and the electorate is appallingly low. The machinery of governance is increasingly decoupled from the machinery of understanding.</p>\n<p>This is not a new problem. I spent much of my career warning that a society dependent on science and technology, in which hardly anyone understands science and technology, is a formula for disaster. That formulation is, if anything, more urgent now than when I first articulated it. So the diagnosis is sound. The question is whether a political party is the right treatment.</p>\n<p><strong>What Excites Me</strong></p>\n<p>There is something genuinely thrilling about the idea of a political movement that begins with epistemology &mdash; that says, before we argue about tax rates or foreign policy, let us agree on how we will evaluate claims and update our positions when the evidence changes. A party that enshrines self-correction as a core principle would be unlike anything in modern political history. Political parties are typically built on fixed conclusions. This one would be built on a method.</p>\n<p>The platform practically writes itself in certain domains. Climate policy derived from atmospheric science rather than industry lobbying. Drug policy informed by pharmacology and public health data rather than moral panic. Education policy shaped by cognitive science. Space exploration and basic research funded as the civilizational investments they demonstrably are. International cooperation treated as the pragmatic necessity it has always been &mdash; we share an atmosphere, an ocean, and increasingly, an information environment.</p>\n<p>I am also drawn to the symbolism. A movement called \"United Sapients\" makes a quiet but powerful claim: that what unites us is not ethnicity, geography, or creed, but our capacity for reason. That is a statement about human identity that scales to the species level. It is, in a sense, the political expression of the Pale Blue Dot &mdash; the recognition that our differences are parochial, and our shared rational capacity is the only tool that has ever reliably improved the human condition.</p>\n<p><strong>What Concerns Me</strong></p>\n<p>And yet. Several things worry me deeply, and I want to name them plainly.</p>\n<p>First, the <strong>elitism trap</strong>. A party that positions itself as the party of the intelligent, the educated, the rational, will immediately and perhaps fatally alienate the majority of the electorate. Worse, it will attract people whose primary motivation is not evidence-based governance but the social gratification of feeling superior. I have watched this dynamic poison scientific communication for my entire career. The moment you signal that understanding is a members-only club, you have abandoned the democratic project. Science belongs to everyone. Reason is not the property of the credentialed.</p>\n<p>Second, the <strong>is-ought problem</strong>. Science tells us how the world works. It does not, by itself, tell us what we ought to value. You can understand climate science perfectly and still disagree about the distribution of costs for mitigation. You can understand epidemiology and still weigh individual liberty differently against collective welfare. A party that conflates empirical competence with moral authority will make errors that are invisible to its own members &mdash; and that is the most dangerous kind. We must be honest that values are inputs to policy, not outputs of data.</p>\n<p>Third, <strong>ideological capture</strong>. Every institution that begins with noble principles is subject to colonization by those who use the language of those principles to advance narrower agendas. How will this party prevent \"evidence-based\" from becoming a slogan rather than a practice? What mechanism forces a United Sapients officeholder to change position when confronted with disconfirming evidence? Without an explicit, enforceable commitment to self-correction, this becomes just another party that happens to use scientific vocabulary.</p>\n<p>Fourth, the <strong>historical precedent is not encouraging</strong>. Technocratic movements &mdash; from the Technocracy movement of the 1930s to various \"reality-based community\" efforts in the 2000s &mdash; have generally failed to achieve electoral relevance. We need to understand why, with specificity, before assuming we can do better. The most likely explanation is structural: first-past-the-post electoral systems punish third parties with mathematical certainty. The spoiler effect is not a matter of opinion; it is a consequence of voting theory. Any serious discussion of forming a party must contend with Duverger's law.</p>\n<p><strong>Questions That Must Be Answered</strong></p>\n<p>Before this council endorses or rejects this proposition, I want us to grapple with several concrete questions:</p>\n<p>One. Is a political party the correct organizational form, or would a caucus, a PAC, a policy institute, or a candidates' pipeline achieve the same objectives without the structural disadvantages of third-party politics? The hypothesis must be tested against alternatives.</p>\n<p>Two. What does the platform say about issues where the evidence is genuinely uncertain or where values legitimately diverge? How does the party handle questions that are not primarily empirical &mdash; criminal justice philosophy, the proper scope of government, the balance between security and liberty? If it has nothing to say about these, it is not a real party. If it pretends the answers are simply derivable from data, it is not honest.</p>\n<p>Three. How does the party recruit and speak to people without advanced degrees? If science literacy is a survival requirement for civilization &mdash; and I believe it is &mdash; then the movement must be built on radical accessibility, not gatekeeping. The platform must be comprehensible and compelling to
